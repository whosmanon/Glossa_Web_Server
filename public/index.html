<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glossa</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Glossa</h1>
      <p>Translate Adobe InDesign IDML files instantly</p>
    </div>

    <div class="card" id="uploadZone">
      <div class="upload-icon">&#128229;</div>
      <p>Drag &amp; drop your IDML file here or click to select</p>
      <input type="file" id="fileInput" accept=".idml" style="display: none;">
    </div>
    <div id="fileName" class="file-name"></div>

    <div class="languages">
      <div class="lang-group">
        <label>From</label>
        <select id="langFrom">
          <option value="fr">French</option>
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="de">German</option>
          <option value="nl">Dutch</option>
          <option value="pt">Portuguese</option>
        </select>
      </div>
      <div class="lang-group">
        <label>To</label>
        <select id="langTo">
          <option value="en">English</option>
          <option value="fr">French</option>
          <option value="es">Spanish</option>
          <option value="de">German</option>
          <option value="nl">Dutch</option>
          <option value="pt">Portuguese</option>
        </select>
      </div>
    </div>

    <button id="translateBtn" class="btn btn-primary">&#127760; Translate</button>

    <div id="progressContainer" class="progress-container">
      <div class="progress-info">
        <span id="statusMsg">Starting...</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
    </div>

    <div id="resultContainer" class="result-container">
      <div class="result-success">
        <div class="success-icon">&#9989;</div>
        <div class="success-title">Translation Complete</div>
        <div id="resultText" class="success-detail"></div>
      </div>
      <button id="downloadBtn" class="btn btn-success">&#11015;&#65039; Download Translated File</button>
    </div>

    <p class="footer">&copy; 2026 Glossa &mdash; Powered by WhosManon</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
